    <style>
        :root {
            --bg: #0f172a;
            --surface: rgba(30, 41, 59, 0.85);
            --primary: #3b82f6;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Map Container */
        #map {
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        /* Glassmorphism Top Nav */
        .top-nav {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: var(--surface);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 800px;
            justify-content: space-between;
        }

        .logo {
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .filters {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .filters::-webkit-scrollbar { display: none; }

        .filter-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .hamburger {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        
        .hamburger:hover { transform: scale(1.1); }

        /* Sidebar Menu */
        .sidebar {
            position: absolute;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100vh;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            z-index: 2000;
            border-left: 1px solid var(--glass-border);
            transition: right 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px;
            overflow-y: auto;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.open { right: 0; }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .sidebar h3 {
            margin: 20px 0 10px 0;
            font-size: 1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
            margin-bottom: 20px;
            outline: none;
        }

        select option { background: var(--bg); }

        .menu-list { list-style: none; }
        
        .menu-list li {
            padding: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-list li:hover { background: rgba(255,255,255,0.1); border-radius: 8px;}
        
        .community-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            font-weight: 600;
        }

        /* Custom Tooltip */
        .glass-tooltip {
            background: rgba(15, 23, 42, 0.9) !important;
            backdrop-filter: blur(8px) !important;
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            color: #f8fafc !important;
            border-radius: 8px !important;
            padding: 6px 12px !important;
            font-weight: 600 !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5) !important;
            font-family: 'Inter', sans-serif !important;
        }
        
        .glass-tooltip::before {
            border-top-color: rgba(15, 23, 42, 0.9) !important;
        }

        /* Modal Overlay */
        .modal {
            position: absolute;
            bottom: -100%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 600px;
            background: var(--surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px 20px 0 0;
            z-index: 1500;
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            max-height: 80vh;
        }

        .modal.active { bottom: 0; }

        .modal-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 20px 20px 0 0;
        }

        .modal-content {
            padding: 24px;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .modal-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 5px; }
        
        .stars { color: #fbbf24; font-size: 1rem; }
        .reviews { color: var(--text-muted); font-size: 0.8rem; }

        .risk-container {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .risk-badge {
            font-size: 0.75rem;
            padding: 5px 10px;
            border-radius: 6px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
        }

        .risk-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .dot-Low { background: #10b981; }
        .dot-Medium { background: #f59e0b; }
        .dot-High { background: #ef4444; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .info-card {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .info-card h4 { color: var(--primary); margin-bottom: 8px; font-size: 0.9rem; }
        .info-card p { font-size: 0.9rem; line-height: 1.5; color: #cbd5e1; }

        .google-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            margin-top: 20px;
            transition: background 0.3s ease;
        }

        .google-btn:hover { background: #1d4ed8; }
        
        .modal-close {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Custom Map Pins */
        .custom-pin svg { filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.5)); transition: transform 0.2s; }
        .custom-pin:hover svg { transform: scale(1.2); }

        @media (max-width: 768px) {
            .top-nav { width: 95%; padding: 10px 15px; }
            .sidebar { width: 100%; right: -100%; }
            .modal { width: 100%; max-width: 100%; border-radius: 20px 20px 0 0; }
        }
    </style>

        // Parse Data
        const places = rawData.trim().split('\n').filter(l => l).map((line, index) => {
            const p = line.split('|');
            return {
                id: index,
                name: p[0], lat: parseFloat(p[1]), lng: parseFloat(p[2]),
                type: p[3], community: p[4], rainRisk: p[5],
                mountainRisk: p[6], safetyRisk: p[7],
                rating: parseFloat(p[8]), reviews: parseInt(p[9]),
                desc: p[10], whatToDo: p[11], howToGo: p[12], foodToTry: p[13]
            };
        });

        // Design System Colors
        const communityColors = {
            'Naga': '#e11d48', 'Muslim': '#16a34a', 'Bengali': '#2563eb',
            'Nepali': '#ea580c', 'Marwari': '#ca8a04', 'Tibetan': '#9333ea', 'Mixed': '#94a3b8'
        };

        const createPin = (color) => L.divIcon({
            className: 'custom-pin',
            html: `<svg width="30" height="42" viewBox="0 0 24 36" fill="${color}" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 0C5.373 0 0 5.373 0 12C0 21 12 36 12 36C12 36 24 21 24 12C24 5.373 18.627 0 12 0ZM12 16.5C9.515 16.5 7.5 14.485 7.5 12C7.5 9.515 9.515 7.5 12 7.5C14.485 7.5 16.5 9.515 16.5 12C16.5 14.485 14.485 16.5 12 16.5Z" fill="${color}" stroke="#ffffff" stroke-width="1.5"/>
                   </svg>`,
            iconSize: [30, 42],
            iconAnchor: [15, 42]
        });

        // Initialize Map (Dark Mode Tiles)
        const map = L.map('map', { zoomControl: false }).setView([26.7271, 88.3953], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap © CARTO'
        }).addTo(map);

        let markersLayer = L.featureGroup().addTo(map);
        let zonesLayer = L.featureGroup().addTo(map);
        let currentType = 'All';
        let currentCommunity = 'All';

        // Core Functions
        const renderMap = () => {
            markersLayer.clearLayers();
            zonesLayer.clearLayers();
            const listEl = document.getElementById('places-list');
            listEl.innerHTML = '';

            places.forEach(p => {
                if ((currentType === 'All' || p.type === currentType) && 
                    (currentCommunity === 'All' || p.community === currentCommunity)) {
                    
                    // Add Map Polygon/Circle Zone Color Coding
                    if (p.community !== 'Mixed') {
                        L.circle([p.lat, p.lng], {
                            radius: 1800, // 1.8km radius for ethnic zone heatmapping
                            color: communityColors[p.community],
                            fillColor: communityColors[p.community],
                            fillOpacity: 0.08,
                            weight: 0,
                            interactive: false // don't block clicks on the map
                        }).addTo(zonesLayer);
                    }

                    // Add Marker & Hover Tooltip
                    const marker = L.marker([p.lat, p.lng], { icon: createPin(communityColors[p.community]) })
                                    .bindTooltip(p.name, { 
                                        direction: 'top', 
                                        offset: [0, -35], 
                                        className: 'glass-tooltip' 
                                    })
                                    .addTo(markersLayer)
                                    .on('click', () => openModal(p));
                    
                    // Add to Sidebar
                    const li = document.createElement('li');
                    li.innerHTML = `<span>${p.name}</span> <span class="community-badge" style="background:${communityColors[p.community]}20; color:${communityColors[p.community]}">${p.community}</span>`;
                    li.onclick = () => {
                        map.flyTo([p.lat, p.lng], 15, { animate: true, duration: 1 });
                        openModal(p);
                        if(window.innerWidth < 768) toggleSidebar();
                    };
                    listEl.appendChild(li);
                }
            });
        };

        const renderFoodRecommendations = () => {
            const foodList = document.getElementById('food-list');
            foodList.innerHTML = '';
            // Get unique, highly rated food spots
            places.filter(p => p.type === 'Food' && p.rating >= 4.5).slice(0, 10).forEach(p => {
                const li = document.createElement('li');
                li.innerHTML = `<span>🍽️ ${p.foodToTry}</span> <span style="font-size:0.8rem; color:var(--text-muted)">@${p.name}</span>`;
                li.onclick = () => { map.flyTo([p.lat, p.lng], 16); openModal(p); };
                foodList.appendChild(li);
            });
        }

        const openModal = (p) => {
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-img').src = `https://picsum.photos/seed/${encodeURIComponent(p.name)}/600/300`;
            
            const badge = document.getElementById('modal-community-badge');
            badge.innerText = p.community + ' Zone';
            badge.style.backgroundColor = communityColors[p.community] + '20';
            badge.style.color = communityColors[p.community];
            badge.style.border = `1px solid ${communityColors[p.community]}`;

            document.getElementById('modal-stars').innerHTML = `⭐ ${p.rating} <span class="reviews">(${p.reviews.toLocaleString()} Google Reviews)</span>`;
            
            ['rain', 'mount', 'safe'].forEach((risk, i) => {
                const val = p[['rainRisk', 'mountainRisk', 'safetyRisk'][i]];
                document.getElementById(`val-${risk}`).innerText = val;
                document.getElementById(`dot-${risk}`).className = `risk-dot dot-${val}`;
            });

            document.getElementById('modal-desc').innerText = p.desc;
            document.getElementById('modal-todo').innerText = p.whatToDo;
            document.getElementById('modal-how').innerText = p.howToGo;
            
            const foodCard = document.getElementById('food-card');
            if(p.foodToTry && p.foodToTry !== 'N/A') {
                foodCard.style.display = 'block';
                document.getElementById('modal-food').innerText = p.foodToTry;
            } else {
                foodCard.style.display = 'none';
            }

            document.getElementById('modal-map-btn').href = `https://www.google.com/maps/search/?api=1&query=${p.lat},${p.lng}`;
            document.getElementById('details-modal').classList.add('active');
        };

        // Event Listeners
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentType = e.target.dataset.type;
                renderMap();
            });
        });

        document.getElementById('community-filter').addEventListener('change', (e) => {
            currentCommunity = e.target.value;
            renderMap();
        });

        const toggleSidebar = () => document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('menu-btn').addEventListener('click', toggleSidebar);
        document.getElementById('close-btn').addEventListener('click', toggleSidebar);
        
        document.getElementById('modal-close').addEventListener('click', () => {
            document.getElementById('details-modal').classList.remove('active');
        });

        // Initialize
        renderMap();
        renderFoodRecommendations();
        
    </script>
