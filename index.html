<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- PWA Setup -->
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="./icon.png">
    <link rel="icon" type="image/png" href="./icon.png">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <title>Mauj Locator | North Bengal</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        :root {
            --bg-color: #f8fafc;
            --surface: #ffffff;
            --primary: #0c831f; 
            --primary-light: #e6f2eb;
            --primary-dark: #0a6b18;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --warning: #f59e0b;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: #e2e8f0; color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        /* App Container - Mobile Wrapper */
        #app-container {
            width: 100%; max-width: 480px; height: 100%; background: var(--bg-color);
            position: relative; display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg); overflow: hidden;
        }

        /* --- HEADER & TOP BARS --- */
        header { padding: 16px 20px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 20; }
        
        .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .logo-area h1 { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
        
        .status-pills { display: flex; gap: 8px; }
        .pill { 
            font-size: 0.7rem; font-weight: 700; padding: 6px 10px; border-radius: 20px; 
            display: flex; align-items: center; gap: 4px; box-shadow: var(--shadow-sm);
        }
        .pill.gps { color: #fff; background: #2563eb; transition: background 0.3s; }
        .pill.gps.error { background: var(--danger); }
        .pill.weather { color: var(--text-main); background: #f1f5f9; border: 1px solid var(--border); }

        .search-container { position: relative; }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 1.1rem; }
        .search-input {
            width: 100%; padding: 14px 14px 14px 40px; border: 1px solid var(--border);
            border-radius: 12px; background: #f8fafc; font-size: 0.95rem; font-weight: 500;
            transition: all 0.2s; outline: none;
        }
        .search-input:focus { background: var(--surface); border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        /* --- MAIN CONTENT & VIEWS --- */
        main { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 90px; scroll-behavior: smooth; }
        .view { display: none; height: 100%; animation: fadeSlideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .view.active { display: block; }

        @keyframes fadeSlideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- DASHBOARD HOME --- */
        .section-title { padding: 24px 20px 12px; font-size: 1.15rem; font-weight: 800; color: var(--text-main); }
        .grid-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 0 20px; }

        .category-tile {
            background: var(--surface); border-radius: 16px; padding: 14px 6px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            box-shadow: var(--shadow-sm); cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
            border: 1px solid var(--border);
        }
        .category-tile:active { transform: scale(0.96); background: #f8fafc; }
        .icon-circle { width: 48px; height: 48px; background: var(--primary-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.6rem; }
        .category-tile span { font-size: 0.75rem; font-weight: 700; color: var(--text-main); text-align: center; line-height: 1.2; }

        .map-banner {
            grid-column: span 4; background: linear-gradient(135deg, #0ea5e9, #2563eb);
            border-radius: 16px; padding: 20px; color: white; display: flex; justify-content: space-between; align-items: center;
            box-shadow: var(--shadow-md); cursor: pointer; transition: transform 0.15s;
        }
        .map-banner:active { transform: scale(0.98); }
        .map-banner-text h3 { font-size: 1.2rem; font-weight: 800; margin-bottom: 4px; }
        .map-banner-text p { font-size: 0.85rem; font-weight: 500; opacity: 0.9; }
        .map-banner .icon-circle { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); }

        /* --- LIST VIEW & CARDS --- */
        .list-header {
            position: sticky; top: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(8px);
            padding: 16px 20px; display: flex; align-items: center; gap: 16px; z-index: 10;
            border-bottom: 1px solid var(--border);
        }
        .back-btn { background: #f1f5f9; border: none; width: 36px; height: 36px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
        .back-btn:active { background: #e2e8f0; }

        .item-card {
            background: var(--surface); margin: 12px 20px; border-radius: 16px; padding: 16px;
            display: flex; gap: 14px; box-shadow: var(--shadow-sm); border: 1px solid var(--border);
            position: relative; overflow: hidden;
        }
        .item-img { width: 64px; height: 64px; border-radius: 12px; background: var(--primary-light); display: flex; align-items: center; justify-content: center; font-size: 2rem; flex-shrink: 0; }
        .item-content { flex: 1; display: flex; flex-direction: column; }
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .item-title { font-weight: 800; font-size: 1rem; color: var(--text-main); line-height: 1.2; padding-right: 8px; }
        
        .fav-btn { background: none; border: none; font-size: 1.2rem; cursor: pointer; color: #cbd5e1; transition: color 0.2s; padding: 4px; margin: -4px; }
        .fav-btn.active { color: var(--danger); }
        
        .item-desc { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .item-actions { display: flex; align-items: center; gap: 8px; justify-content: space-between; margin-top: auto; }
        .meta-tags { display: flex; gap: 6px; }
        .tag { font-size: 0.7rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; }
        .tag.rating { background: var(--warning); color: #fff; }
        .tag.dist { background: #f1f5f9; color: var(--text-muted); }
        
        .action-btns { display: flex; gap: 6px; }
        .btn { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 0.8rem; cursor: pointer; border: none; display: flex; align-items: center; gap: 4px; }
        .btn-share { background: #f1f5f9; color: var(--text-main); }
        .btn-go { background: var(--primary); color: white; box-shadow: 0 2px 4px rgba(12, 131, 31, 0.3); }
        .btn:active { transform: scale(0.95); }

        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .empty-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
        .empty-state h3 { font-weight: 700; margin-bottom: 8px; color: var(--text-main); }

        /* --- MAP VIEW --- */
        #map-container { width: 100%; height: 100%; position: relative; }
        #leaflet-map { width: 100%; height: 100%; z-index: 1; }
        .map-controls { position: absolute; top: 20px; left: 20px; z-index: 1000; display: flex; gap: 10px; }
        .map-btn { width: 44px; height: 44px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-md); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; color: var(--text-main); }
        .map-btn.recenter { top: auto; bottom: 30px; right: 20px; left: auto; position: absolute; background: var(--primary); color: white; }

        /* Custom Leaflet Popups */
        .leaflet-popup-content-wrapper { border-radius: 16px; box-shadow: var(--shadow-lg); padding: 0; overflow: hidden; }
        .leaflet-popup-content { margin: 0; padding: 16px; width: 220px !important; }
        .popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .popup-icon { font-size: 1.8rem; }
        .popup-title { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 0.95rem; color: var(--text-main); line-height: 1.2; }
        .popup-desc { font-family: 'Inter', sans-serif; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 12px; }
        .popup-btn { display: block; width: 100%; text-align: center; background: #2563eb; color: white; padding: 8px; border-radius: 8px; text-decoration: none; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 0.85rem; }

        /* Custom Markers */
        .user-marker { width: 18px; height: 18px; background: #2563eb; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px rgba(37, 99, 235, 0.8); }
        .custom-pin { background: white; border-radius: 50%; width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md); font-size: 18px; border: 2px solid var(--border); transition: transform 0.2s; }
        .custom-pin:hover { transform: scale(1.1); z-index: 1000 !important; border-color: var(--primary); }

        /* --- BOTTOM NAVIGATION --- */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
            border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 10px 24px; z-index: 50;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; cursor: pointer; width: 64px; transition: color 0.2s; }
        .nav-item.active { color: var(--primary); }
        .nav-item .icon { font-size: 1.4rem; transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .nav-item.active .icon { transform: translateY(-2px); }

        /* --- TOAST NOTIFICATIONS --- */
        #toast-container { position: absolute; bottom: 100px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 100; pointer-events: none; }
        .toast { background: rgba(15, 23, 42, 0.9); color: white; padding: 10px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; box-shadow: var(--shadow-lg); animation: toastFade 0.3s, toastFadeOut 0.3s 2.7s forwards; }
        @keyframes toastFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastFadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-10px); } }
    </style>
</head>
<body>

    <div id="app-container">
        <!-- Header -->
        <header id="main-header">
            <div class="top-row">
                <div class="logo-area">
                    <h1>Mauj Locator 🎯</h1>

                </div>
            </div>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="search-input" placeholder="Search Momos, Beer, Spas..." autocomplete="off">
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-scroll">
            
            <!-- Dashboard View -->
            <div id="view-home" class="view active">
                <div class="grid-container" style="padding-top: 16px;">
                    <div class="map-banner" onclick="switchView('map')">

                            <h3>Live Radar View</h3>
                            <p>100 spots loaded nearby</p>
                        </div>
                        <div class="icon-circle">🗺️</div>
                    </div>
                </div>

                <div class="section-title">Meat & Grills</div>
                <div class="grid-container">
                    <div class="category-tile" onclick="openList('Pork')">
                        <div class="icon-circle">🥓</div><span>Pork</span>
                    </div>
                    <div class="category-tile" onclick="openList('Beef')">
                        <div class="icon-circle">🥩</div><span>Beef</span>
                    </div>
                    <div class="category-tile" onclick="openList('Buff')">
                        <div class="icon-circle">🐃</div><span>Buff</span>
                    </div>
                    <div class="category-tile" onclick="openList('Other Meat')">
                        <div class="icon-circle">🍗</div><span>Poultry & Fish</span>
                    </div>
                </div>

                <div class="section-title">Indulgence & Relaxation</div>
                <div class="grid-container">
                    <div class="category-tile" onclick="openList('Liquor')">
                        <div class="icon-circle">🍺</div><span>Bars</span>
                    </div>
                    <div class="category-tile" onclick="openList('Store')">
                        <div class="icon-circle">🍾</div><span>FL Shops</span>
                    </div>
                    <div class="category-tile" onclick="openList('Spa')">
                        <div class="icon-circle">💆</div><span>Spas</span>
                    </div>
                    <div class="category-tile" onclick="openList('Wellness')">
                        <div class="icon-circle">🧖</div><span>Wellness</span>
                    </div>
                </div>
                <br>
            </div>

            <!-- List View (Categories & Search) -->
            <div id="view-list" class="view">
                <div class="list-header">
                    <button class="back-btn" onclick="switchView('home')">←</button>
                    <h2 id="list-title" style="font-size: 1.15rem; font-weight: 800;">Results</h2>
                </div>
                <div id="list-content">
                    <!-- Cards populated by JS -->
                </div>
            </div>

            <!-- Favorites View -->
            <div id="view-favs" class="view">
                <div class="list-header">
                    <h2 style="font-size: 1.15rem; font-weight: 800;">⭐ Saved Spots</h2>
                </div>
                <div id="favs-content">
                    <!-- Cards populated by JS -->
                </div>
            </div>

            <!-- Map View -->
            <div id="view-map" class="view" style="padding-bottom: 0;">
                <div id="map-container">
                    <div class="map-controls">
                        <button class="map-btn" onclick="switchView('home')">←</button>
                    </div>
                    <div id="leaflet-map"></div>
                    <button class="map-btn recenter" onclick="recenterMap()">🎯</button>
                </div>
            </div>
        </main>

        <!-- Bottom Nav -->
        <nav class="bottom-nav">
            <div class="nav-item active" data-target="home" onclick="switchView('home')">
                <span class="icon">🏠</span><span>Home</span>
            </div>
            <div class="nav-item" data-target="map" onclick="switchView('map')">
                <span class="icon">🗺️</span><span>Map</span>
            </div>
            <div class="nav-item" data-target="favs" onclick="switchView('favs')">
                <span class="icon">⭐</span><span>Saved</span>
            </div>
            <div class="nav-item" onclick="showToast('Protocol active. Stay hydrated. 💧')">
                <span class="icon">⚙️</span><span>Protocol</span>
            </div>
        </nav>

        <!-- Toast Notifications Container -->
        <div id="toast-container"></div>
    </div>

        let userLat = 26.7160; 
        let userLng = 88.4240;
        let mapInstance = null;
        let userMarker = null;
        let savedFavs = JSON.parse(localStorage.getItem('mauj_favs') || '[]');

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)))).toFixed(1);
        }

        function showToast(msg) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => { if(container.contains(toast)) toast.remove(); }, 3000);
        }

        async function fetchWeather() {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${userLat}&longitude=${userLng}&current_weather=true`);
                const data = await res.json();
                const temp = data.current_weather.temperature;
                const weatherPill = document.getElementById('weather-status');
                weatherPill.innerHTML = `🌤️ ${temp}°C`;
            } catch (err) {
                console.warn("Weather API failed", err);
                document.getElementById('weather-status').innerHTML = `☁️ --°C`;
            }
        }

        async function shareLocation(name, lat, lng) {
            const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' Siliguri West Bengal')}`;
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: `Check out ${name} on Mauj Locator`,
                        text: `Found this spot: ${name}. Let's go!`,
                        url: mapUrl
                    });
                    showToast('Shared successfully!');
                } catch (err) {
                    console.log('User cancelled share');
                }
            } else {
                navigator.clipboard.writeText(mapUrl);
                showToast('Link copied to clipboard!');
            }
        }

        function openInGoogleMaps(name, lat, lng) {
            const query = encodeURIComponent(`${name} near Siliguri, West Bengal`);
            window.open(`https://www.google.com/maps/search/?api=1&query=${query}`, '_blank');
        }

        function toggleFav(id) {
            const index = savedFavs.indexOf(id);
            if (index > -1) {
                savedFavs.splice(index, 1);
                showToast('Removed from saved spots');
            } else {
                savedFavs.push(id);
                showToast('⭐ Saved successfully!');
            }
            localStorage.setItem('mauj_favs', JSON.stringify(savedFavs));
            
            const activeView = document.querySelector('.view.active').id;
            if (activeView === 'view-list') handleSearch(); 
            if (activeView === 'view-favs') renderFavs();
        }

        function initGPS() {
            const gpsText = document.getElementById('gps-status');
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(
                    (position) => {
                        userLat = position.coords.latitude;
                        userLng = position.coords.longitude;
                        gpsText.innerHTML = `📍 Live`;
                        gpsText.classList.remove('error');
                        fetchWeather();
                        if (mapInstance && userMarker) {
                            userMarker.setLatLng([userLat, userLng]);
                        }
                    },
                    (error) => {
                        console.warn("GPS Error:", error);
                        gpsText.innerHTML = "⚠️ Offline";
                        gpsText.classList.add('error');
                        fetchWeather(); 
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            } else {
                fetchWeather();
            }
        }

        function switchView(target) {
            document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById('main-header').style.display = (target === 'map') ? 'none' : 'block';
            document.getElementById(`view-${target}`).classList.add('active');
            const navBtn = document.querySelector(`.nav-item[data-target="${target}"]`);
            if (navBtn) navBtn.classList.add('active');
            document.getElementById('main-scroll').scrollTop = 0;
            if (target === 'map') initMap();
            if (target === 'favs') renderFavs();
        }

        function generateCardHTML(item, dist) {
            const isFav = savedFavs.includes(item.id);
            return `
                <div class="item-card">
                    <div class="item-img">${item.emoji}</div>
                    <div class="item-content">
                        <div class="item-header">
                            <div class="item-title">${item.name}</div>
                            <button class="fav-btn ${isFav ? 'active' : ''}" onclick="toggleFav('${item.id}')">${isFav ? '❤️' : '🤍'}</button>
                        </div>
                        <div class="item-desc">${item.desc}</div>
                        <div class="item-actions">
                            <div class="meta-tags">
                                <span class="tag rating">★ ${item.rating}</span>
                                <span class="tag dist">${dist} km</span>
                            </div>
                            <div class="action-btns">
                                <button class="btn btn-share" onclick="shareLocation('${item.name}', ${item.lat}, ${item.lng})">↗️</button>
                                <button class="btn btn-go" onclick="openInGoogleMaps('${item.name}', ${item.lat}, ${item.lng})">GO</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderList(items, containerId) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            if(items.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">🏜️</div>
                        <h3>Nothing found here</h3>
                    </div>`;
                return;
            }
            items.sort((a, b) => getDistance(userLat, userLng, a.lat, a.lng) - getDistance(userLat, userLng, b.lat, b.lng));
            let htmlString = '';
            items.forEach(item => {
                const dist = getDistance(userLat, userLng, item.lat, item.lng);
                htmlString += generateCardHTML(item, dist);
            });
            container.innerHTML = htmlString;
        }

        function openList(category) {
            switchView('list');
            const titleEmoji = appData.find(i => i.type === category)?.emoji || "📌";
            document.getElementById('list-title').innerText = `${titleEmoji} ${category}`;
            const items = appData.filter(item => item.type === category);
            renderList(items, 'list-content');
        }

        function renderFavs() {
            const favItems = appData.filter(item => savedFavs.includes(item.id));
            renderList(favItems, 'favs-content');
        }

        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', handleSearch);

        function handleSearch() {
            const query = searchInput.value.toLowerCase().trim();
            if(query.length < 2) return;
            if (!document.getElementById('view-list').classList.contains('active')) switchView('list');
            document.getElementById('list-title').innerText = `🔍 Results for "${query}"`;
            const items = appData.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.type.toLowerCase().includes(query) || 
                item.desc.toLowerCase().includes(query)
            );
            renderList(items, 'list-content');
        }

        function initMap() {
            if (!mapInstance) {
                mapInstance = L.map('leaflet-map', { zoomControl: false }).setView([userLat, userLng], 13);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                    attribution: '© OpenStreetMap, © CartoDB',
                    maxZoom: 19
                }).addTo(mapInstance);
                const userIcon = L.divIcon({ className: 'user-marker', iconSize: [18, 18] });
                userMarker = L.marker([userLat, userLng], { icon: userIcon, zIndexOffset: 1000 }).addTo(mapInstance);
                appData.forEach(item => {
                    const icon = L.divIcon({
                        className: 'custom-pin-wrapper',
                        html: `<div class="custom-pin">${item.emoji}</div>`,
                        iconSize: [34, 34],
                        iconAnchor: [17, 17]
                    });
                    const marker = L.marker([item.lat, item.lng], { icon: icon }).addTo(mapInstance);
                    marker.bindPopup(`
                        <div class="popup-header">
                            <div class="popup-icon">${item.emoji}</div>
                            <div class="popup-title">${item.name}</div>
                        </div>
                        <div class="popup-desc">${item.desc}</div>
                        <a href="javascript:void(0)" onclick="openInGoogleMaps('${item.name}', ${item.lat}, ${item.lng})" class="popup-btn">Navigate Here</a>
                    `);
                });
            } else {
                mapInstance.invalidateSize();
            }
        }

        function recenterMap() {
            if (mapInstance) mapInstance.flyTo([userLat, userLng], 15, { animate: true, duration: 1 });
        }

        window.onload = () => {
            initGPS();
            switchView('home');
        };
